<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Unit Price Checker social card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f" />
      <stop offset="55%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1010" cy="120" r="220" fill="#38bdf8" opacity="0.12" />
  <circle cx="180" cy="560" r="180" fill="#34d399" opacity="0.09" />

  <g transform="translate(80 88)">
    <text x="0" y="42" fill="#7dd3fc" font-size="28" font-family="Inter, Arial, sans-serif" letter-spacing="4">STATIC WEB TOOL</text>
    <text x="0" y="158" fill="#e5eefb" font-size="84" font-weight="800" font-family="Inter, Arial, sans-serif">Unit Price Checker</text>
    <text x="0" y="236" fill="#b8c7dc" font-size="34" font-family="Inter, Arial, sans-serif">
      Compare grocery sizes, pack counts, and coupons by
    </text>
    <text x="0" y="282" fill="#b8c7dc" font-size="34" font-family="Inter, Arial, sans-serif">
      actual cost per unit. No sign-in. No backend. No nonsense.
    </text>

    <g transform="translate(0 348)">
      <rect width="480" height="170" rx="28" fill="#111b31" stroke="#22314e" />
      <text x="34" y="52" fill="#7dd3fc" font-size="20" font-family="Inter, Arial, sans-serif" letter-spacing="3">BEST BUY</text>
      <text x="34" y="102" fill="#e5eefb" font-size="48" font-weight="800" font-family="Inter, Arial, sans-serif">Store brand oats</text>
      <text x="34" y="144" fill="#34d399" font-size="32" font-family="Inter, Arial, sans-serif">$0.134 / oz</text>
    </g>

    <g transform="translate(535 330)">
      <rect width="510" height="206" rx="28" fill="#111b31" stroke="#22314e" />
      <rect x="34" y="34" width="442" height="38" rx="19" fill="#0b1220" />
      <rect x="34" y="92" width="390" height="38" rx="19" fill="#0b1220" />
      <rect x="34" y="150" width="330" height="38" rx="19" fill="#0b1220" />
      <path d="M390 53h70" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" />
      <path d="M332 111h128" stroke="#7dd3fc" stroke-width="14" stroke-linecap="round" />
      <path d="M274 169h186" stroke="#34d399" stroke-width="14" stroke-linecap="round" />
      <text x="34" y="26" fill="#b8c7dc" font-size="18" font-family="Inter, Arial, sans-serif">Compare three options live</text>
